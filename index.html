        // Icon Components

        const Settings = ({ size = 24, style = {} }) => (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>

        // Bottom Navigation Component

                  {codeProvider === 'mastercard' && (

            <div style={{height: '100vh', display: 'flex', flexDirection: 'column', backgroundColor: 'white', overflow: 'hidden'}}>
              <StatusBar />
              
              <div style={{flex: 1, overflowY: 'auto', paddingTop: 56, paddingBottom: 80}}>
                <div style={{padding: '0 16px', marginBottom: 24}}>
                  <div onClick={onBack} style={{display: 'flex', gap: 4, alignItems: 'center', cursor: 'pointer'}}>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 18L9 12L15 6" stroke="#4062CC" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    <p style={{fontWeight: 600, fontSize: '16px', color: '#4062cc', margin: 0}}>Back</p>

                      <p style={{fontWeight: 600, fontSize: '18px', color: '#000000', margin: 0}}>Online</p>
                    </div>
                    
                    {codeProvider === 'mixed' && (
                      <div style={{display: 'flex', alignItems: 'center', gap: 4}}>
                        <p style={{fontWeight: 400, fontSize: '10px', color: '#666666', margin: 0, whiteSpace: 'nowrap'}}>Powered by</p>
                        <svg width="24" height="17" viewBox="0 0 152.4 108"><rect x="60.4" y="25.7" fill="#FF5F00" width="31.5" height="56.6"/><path fill="#EB001B" d="M62.4,54c0-11,5.1-21.5,13.7-28.3c-15.6-12.3-38.3-9.6-50.6,6.1C13.3,47.4,16,70,31.7,82.3c13.1,10.3,31.4,10.3,44.5,0C67.5,75.5,62.4,65,62.4,54z"/><path fill="#F79E1B" d="M134.4,54c0,19.9-16.1,36-36,36c-8.1,0-15.9-2.7-22.2-7.7c15.6-12.3,18.3-34.9,6-50.6c-1.8-2.2-3.8-4.3-6-6c15.6-12.3,38.3-9.6,50.5,6.1C131.7,38.1,134.4,45.9,134.4,54z"/></svg>

        // Enter Purchase Amount Screen

          const inputRef = useRef(null);
          const purchaseValue = parseFloat(purchaseAmount) || 0;
          const hasShortfall = purchaseValue > cardBalance;

                      <div style={{position: 'absolute', left: 22.35, top: 109, filter: 'drop-shadow(0px 2px 3px rgba(0, 0, 0, 0.8))', zIndex: 5}}>

        // Main App
        function App() {
          const [currentScreen, setCurrentScreen] = useState('design-selection');
          const [codeProvider, setCodeProvider] = useState('mastercard');
          const [cardBalance, setCardBalance] = useState(1000);
          const [purchaseAmount, setPurchaseAmount] = useState('');
          const [topUpAmount, setTopUpAmount] = useState('');
          const [activeTab, setActiveTab] = useState('cards');

          const handleShowDesignSelection = () => {
            setCurrentScreen('design-selection');
          };

          const handleSelectDesign = (provider) => {
            setCodeProvider(provider);
            setCurrentScreen('card-details');
          };

          const handleActivateMastercard = () => {
            setCurrentScreen('redeem-selection');
          };

          const handleSelectOnline = () => {
            setPurchaseAmount('');
            setCurrentScreen('enter-purchase-amount');
          };

          const handleBackToCardDetails = () => {
            setCurrentScreen('card-details');
          };

          const handleTopUpFromPurchase = () => {
            const purchase = parseFloat(purchaseAmount);
            const shortfall = Math.max(0, purchase - cardBalance);
            setTopUpAmount(shortfall.toString());
            setCurrentScreen('payment-options-from-purchase');
          };

          const handlePaymentSelect = (methodId, fromPurchase) => {
            setCurrentScreen('payment-processing');
            setTimeout(() => {
              const amount = parseFloat(topUpAmount);
              setCardBalance(prev => prev + amount);
              setCurrentScreen(fromPurchase ? 'payment-success-to-online' : 'payment-success-to-card');
            }, 2000);
          };

          const handlePurchaseNext = () => {
            setCurrentScreen('online-redeem');
          };

          const screens = {
            'design-selection': <DesignSelectionScreen onSelect={handleSelectDesign} />,
            'card-details': (
              <CardDetailScreen 
                codeProvider={codeProvider}
                onShowDesignSelection={handleShowDesignSelection}
                onActivateMastercard={handleActivateMastercard}
                cardBalance={cardBalance}
                activeTab={activeTab}
                setActiveTab={setActiveTab}
              />
            ),
            'redeem-selection': <RedeemScreen onSelectOnline={handleSelectOnline} onBack={handleBackToCardDetails} activeTab={activeTab} setActiveTab={setActiveTab} codeProvider={codeProvider} />,
            'enter-purchase-amount': <EnterPurchaseAmountScreen cardBalance={cardBalance} purchaseAmount={purchaseAmount} setPurchaseAmount={setPurchaseAmount} onNext={handlePurchaseNext} onBack={() => setCurrentScreen('redeem-selection')} onTopUp={handleTopUpFromPurchase} activeTab={activeTab} setActiveTab={setActiveTab} />,
            'payment-options-from-purchase': <PaymentOptionsScreen onSelect={(id) => handlePaymentSelect(id, true)} onBack={() => setCurrentScreen('enter-purchase-amount')} activeTab={activeTab} setActiveTab={setActiveTab} />,
            'payment-processing': <PaymentProcessingScreen activeTab={activeTab} setActiveTab={setActiveTab} />,
            'payment-success-to-online': <PaymentSuccessScreen amount={topUpAmount} onNext={() => setCurrentScreen('online-redeem')} activeTab={activeTab} setActiveTab={setActiveTab} />,
            'online-redeem': <OnlineRedeemScreen onBack={handleBackToCardDetails} cardBalance={cardBalance} activeTab={activeTab} setActiveTab={setActiveTab} />
          };

          return (
            <div style={{width: '100%', maxWidth: 393, minHeight: '100vh', height: '100vh', backgroundColor: 'white', position: 'relative', overflow: 'hidden', margin: '0 auto'}}>
              {screens[currentScreen]}
            </div>
          );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
